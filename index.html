<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Life of a Developer</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="progress-bar"></div>

<section class="hero">

<div class="parallax-bg"></div>

<h1 class="typing"></h1>
<p>Scroll to experience the developer journey</p>

</section>


<section class="section">

<h2>Step 1: Learning HTML</h2>

<div class="cards">

<div class="card">&lt;html&gt;</div>
<div class="card">&lt;body&gt;</div>
<div class="card">&lt;h1&gt;</div>

</div>

</section>


<section class="section debug">

<h2>Step 2: Debugging Hell</h2>

<button id="bugBtn">Fix Bug</button>

<p id="bugMsg"></p>

</section>


<section class="section">

<h2>Step 3: Deadline Panic</h2>

<div id="timer">10</div>

</section>


<section class="section laptop">

<h2>Building the Project</h2>

<div class="laptop-screen">

<pre id="code"></pre>

</div>

</section>


<section class="section avatar">

<h2>The Developer</h2>

<img id="devAvatar"
src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
width="120">

<p id="mood">Learning...</p>

</section>


<section class="section">

<h2>Developer Terminal</h2>

<div class="terminal">

<div id="output"></div>

<input id="command" placeholder="type command...">

</div>

</section>


<section class="section success">

<h2>Deploy Website 🚀</h2>

<button id="deployBtn">Deploy</button>

</section>


<script src="script.js"></script>

</body>
</html>
